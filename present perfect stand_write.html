<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Angol Igék - Harmadik Alak Gyakorló</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 25%, #00a86b 50%, #00d4aa 75%, #1e3c72 100%);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 700px;
            width: 100%;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header h1 {
            color: #1e3c72;
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .header p {
            color: #00a86b;
            font-size: 1.1em;
            font-weight: 500;
        }

        .progress-bar {
            background: #e0e0e0;
            border-radius: 10px;
            height: 8px;
            margin-bottom: 30px;
            overflow: hidden;
        }

        .progress-fill {
            background: linear-gradient(90deg, #00a86b, #00d4aa);
            height: 100%;
            transition: width 0.3s ease;
        }

        .question-section {
            margin-bottom: 30px;
        }

        .question-number {
            color: #2a5298;
            font-size: 0.9em;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .question-text {
            background: linear-gradient(135deg, #f0f7ff, #f0fff5);
            padding: 20px;
            border-radius: 10px;
            border-left: 4px solid #2a5298;
            margin-bottom: 25px;
        }

        .question-text p {
            color: #1e3c72;
            font-size: 1.1em;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .question-text p:last-child {
            margin-bottom: 0;
        }

        .verb-highlight {
            color: #00a86b;
            font-weight: 700;
            font-size: 1.3em;
            display: inline-block;
            margin: 0 5px;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .option-label {
            display: flex;
            align-items: flex-start;
            padding: 15px 20px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            background: white;
            font-size: 1em;
            color: #333;
            font-weight: 500;
        }

        .option-label:hover {
            border-color: #2a5298;
            background: #f0f7ff;
            transform: translateX(5px);
        }

        .option-input {
            margin-right: 15px;
            cursor: pointer;
            accent-color: #00a86b;
            width: 20px;
            height: 20px;
            margin-top: 2px;
            flex-shrink: 0;
        }

        .option-text {
            display: flex;
            flex-direction: column;
            width: 100%;
        }

        .option-forms {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
            margin-top: 8px;
        }

        .option-form-item {
            background: #f5f5f5;
            padding: 6px 10px;
            border-radius: 5px;
            font-size: 0.85em;
            color: #555;
            border: 1px solid #ddd;
        }

        .option-form-label {
            font-size: 0.7em;
            color: #999;
            text-transform: uppercase;
            margin-bottom: 2px;
        }

        .option-form-value {
            font-weight: 600;
            color: #1e3c72;
        }

        .button-group {
            display: flex;
            gap: 15px;
            margin-top: 35px;
            justify-content: center;
        }

        button {
            padding: 12px 30px;
            font-size: 1em;
            font-weight: 600;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-submit {
            background: linear-gradient(135deg, #2a5298, #1e3c72);
            color: white;
            flex: 1;
        }

        .btn-submit:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(42, 82, 152, 0.3);
        }

        .btn-submit:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .btn-reset {
            background: #f0f0f0;
            color: #1e3c72;
            flex: 1;
        }

        .btn-reset:hover {
            background: #e0e0e0;
            transform: translateY(-2px);
        }

        .feedback {
            margin-top: 20px;
            padding: 15px 20px;
            border-radius: 10px;
            font-weight: 600;
            display: none;
            text-align: center;
        }

        .feedback.correct {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }

        .feedback.incorrect {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: block;
        }

        .correct-answer {
            background: #e7f5e9;
            padding: 12px;
            border-radius: 8px;
            margin-top: 10px;
            border-left: 3px solid #00a86b;
        }

        .correct-answer-label {
            font-size: 0.9em;
            color: #666;
            margin-bottom: 6px;
        }

        .correct-answer-forms {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 8px;
        }

        .correct-answer-item {
            background: white;
            padding: 6px 10px;
            border-radius: 5px;
            font-size: 0.9em;
            color: #155724;
            border: 1px solid #c3e6cb;
            font-weight: 600;
        }

        .results {
            display: none;
            text-align: center;
        }

        .results.show {
            display: block;
        }

        .results h2 {
            color: #1e3c72;
            font-size: 2em;
            margin-bottom: 20px;
        }

        .score-circle {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            background: linear-gradient(135deg, #00a86b, #00d4aa);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 20px auto;
            font-size: 3em;
            color: white;
            font-weight: bold;
            box-shadow: 0 10px 30px rgba(0, 168, 107, 0.3);
        }

        .score-text {
            color: #666;
            font-size: 1.1em;
            margin: 20px 0;
        }

        @media (max-width: 600px) {
            .container {
                padding: 25px;
            }

            .header h1 {
                font-size: 1.8em;
            }

            .question-text p {
                font-size: 1em;
            }

            .verb-highlight {
                font-size: 1.1em;
            }

            .option-forms, .correct-answer-forms {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🚀 Angol Igék Gyakorló</h1>
            <p>Tanulj meg angol igéket - Mind 3 alak!</p>
        </div>

        <div class="progress-bar">
            <div class="progress-fill" id="progressFill"></div>
        </div>

        <div id="quizContainer">
            <div class="question-section">
                <div class="question-number">
                    Kérdés <span id="currentQuestion">1</span>/<span id="totalQuestions">16</span>
                </div>
                
                <div class="question-text">
                    <p>Válaszd ki az ige helyes angol alakjait!</p>
                    <p><span class="verb-highlight" id="verbBase">áll</span></p>
                </div>

                <div class="options" id="optionsContainer">
                    <!-- Dinamikusan töltődik fel -->
                </div>

                <div class="feedback" id="feedback"></div>
            </div>

            <div class="button-group">
                <button class="btn-submit" id="submitBtn">Ellenőrizz</button>
                <button class="btn-reset" id="nextBtn" style="display: none;">Következő</button>
            </div>
        </div>

        <div class="results" id="results">
            <h2>Gratulálok!</h2>
            <div class="score-circle" id="scoreCircle">16/16</div>
            <p class="score-text" id="scoreText">Tökéletes eredmény!</p>
            <button class="btn-reset" id="restartBtn" style="width: 100%; margin-top: 20px;">Újra szeretnék játszani</button>
        </div>
    </div>

    <script>
        // Angol igék adatbázisa: magyar név, angol base form, past simple, past participle
        const verbs = [
            { hu: 'áll', en: 'stand', base: 'stand', past: 'stood', participle: 'stood' },
            { hu: 'lop', en: 'steal', base: 'steal', past: 'stole', participle: 'stolen' },
            { hu: 'ragaszt', en: 'stick', base: 'stick', past: 'stuck', participle: 'stuck' },
            { hu: 'söpör', en: 'sweep', base: 'sweep', past: 'swept', participle: 'swept' },
            { hu: 'úszik', en: 'swim', base: 'swim', past: 'swam', participle: 'swum' },
            { hu: 'elvisz/visz', en: 'take', base: 'take', past: 'took', participle: 'taken' },
            { hu: 'tanít', en: 'teach', base: 'teach', past: 'taught', participle: 'taught' },
            { hu: 'tép/szakít', en: 'tear', base: 'tear', past: 'tore', participle: 'torn' },
            { hu: 'elmond', en: 'tell', base: 'tell', past: 'told', participle: 'told' },
            { hu: 'gondol', en: 'think', base: 'think', past: 'thought', participle: 'thought' },
            { hu: 'dob', en: 'throw', base: 'throw', past: 'threw', participle: 'thrown' },
            { hu: 'megért', en: 'understand', base: 'understand', past: 'understood', participle: 'understood' },
            { hu: 'ébred', en: 'wake', base: 'wake', past: 'woke', participle: 'woken' },
            { hu: 'visel/hord', en: 'wear', base: 'wear', past: 'wore', participle: 'worn' },
            { hu: 'győz/nyer', en: 'win', base: 'win', past: 'won', participle: 'won' },
            { hu: 'ír', en: 'write', base: 'write', past: 'wrote', participle: 'written' }
        ];

        let currentQuestionIndex = 0;
        let score = 0;
        let answered = false;
        let shuffledVerbs = [];

        // Inicializálás
        function init() {
            shuffledVerbs = [...verbs].sort(() => Math.random() - 0.5);
            currentQuestionIndex = 0;
            score = 0;
            answered = false;
            document.getElementById('totalQuestions').textContent = shuffledVerbs.length;
            document.getElementById('quizContainer').style.display = 'block';
            document.getElementById('results').classList.remove('show');
            loadQuestion();
        }

        // Kérdés betöltése
        function loadQuestion() {
            if (currentQuestionIndex >= shuffledVerbs.length) {
                showResults();
                return;
            }

            answered = false;
            const currentVerb = shuffledVerbs[currentQuestionIndex];
            
            // Progress bar frissítése
            const progress = ((currentQuestionIndex) / shuffledVerbs.length) * 100;
            document.getElementById('progressFill').style.width = progress + '%';
            
            // Kérdés szövege
            document.getElementById('currentQuestion').textContent = currentQuestionIndex + 1;
            document.getElementById('verbBase').textContent = currentVerb.hu;

            // Opciók generálása
            generateOptions(currentVerb);

            // Gombok visszaállítása
            document.getElementById('submitBtn').style.display = 'block';
            document.getElementById('nextBtn').style.display = 'none';
            document.getElementById('feedback').className = 'feedback';
            document.getElementById('feedback').textContent = '';
        }

        // Opciók generálása és összekeverése
        function generateOptions(correctVerb) {
            const options = [
                { 
                    base: correctVerb.base, 
                    past: correctVerb.past, 
                    participle: correctVerb.participle, 
                    isCorrect: true 
                }
            ];

            // 3 random rossz opció
            const wrongVerbs = shuffledVerbs.filter(v => v.base !== correctVerb.base);
            const wrongOptions = wrongVerbs.sort(() => Math.random() - 0.5).slice(0, 3);
            
            wrongOptions.forEach(verb => {
                options.push({
                    base: verb.base,
                    past: verb.past,
                    participle: verb.participle,
                    isCorrect: false
                });
            });

            // Opciók keverése
            options.sort(() => Math.random() - 0.5);

            // HTML generálása
            const container = document.getElementById('optionsContainer');
            container.innerHTML = '';

            options.forEach((option, index) => {
                const label = document.createElement('label');
                label.className = 'option-label';
                label.innerHTML = `
                    <input type="radio" name="answer" value="${index}" class="option-input">
                    <span class="option-text">
                        <span style="font-weight: 600; color: #1e3c72;">Válasz ${index + 1}</span>
                        <span class="option-forms">
                            <div class="option-form-item">
                                <div class="option-form-label">Base</div>
                                <div class="option-form-value">${option.base}</div>
                            </div>
                            <div class="option-form-item">
                                <div class="option-form-label">Past</div>
                                <div class="option-form-value">${option.past}</div>
                            </div>
                            <div class="option-form-item">
                                <div class="option-form-label">Participle</div>
                                <div class="option-form-value">${option.participle}</div>
                            </div>
                        </span>
                    </span>
                `;
                label.onclick = () => {
                    document.querySelectorAll('.option-input').forEach(input => input.checked = false);
                    label.querySelector('.option-input').checked = true;
                };
                container.appendChild(label);
            });
        }

        // Válasz ellenőrzése
        function checkAnswer() {
            const selectedOption = document.querySelector('input[name="answer"]:checked');
            
            if (!selectedOption) {
                alert('Válassz egy opciót!');
                return;
            }

            answered = true;
            const selectedIndex = parseInt(selectedOption.value);
            const options = document.querySelectorAll('.option-label');
            const currentVerb = shuffledVerbs[currentQuestionIndex];
            
            // Az opciók szövegéből kinyerjük az igealakokat
            const selectedOptionText = options[selectedIndex].textContent;
            const isCorrect = checkIfCorrect(selectedIndex, currentVerb);

            const feedback = document.getElementById('feedback');
            
            if (isCorrect) {
                feedback.className = 'feedback correct';
                feedback.innerHTML = '✓ Helyes! Gratulálok!';
                score++;
            } else {
                feedback.className = 'feedback incorrect';
                feedback.innerHTML = `✗ Sajnos nem jó. A helyes válasz:<div class="correct-answer">
                    <div class="correct-answer-label">Helyes alakok:</div>
                    <div class="correct-answer-forms">
                        <div class="correct-answer-item">Base: ${currentVerb.base}</div>
                        <div class="correct-answer-item">Past: ${currentVerb.past}</div>
                        <div class="correct-answer-item">Participle: ${currentVerb.participle}</div>
                    </div>
                </div>`;
            }

            document.getElementById('submitBtn').style.display = 'none';
            document.getElementById('nextBtn').style.display = 'block';
            
            // Opciók letiltása
            document.querySelectorAll('.option-input').forEach(input => input.disabled = true);
        }

        // Annak ellenőrzése, hogy a válasz helyes-e
        function checkIfCorrect(selectedIndex, currentVerb) {
            const options = document.querySelectorAll('.option-label');
            const selectedLabel = options[selectedIndex];
            
            // Az option-form-value elemeket kinyerjük
            const formValues = selectedLabel.querySelectorAll('.option-form-value');
            if (formValues.length < 3) return false;
            
            const selectedBase = formValues[0].textContent.trim();
            const selectedPast = formValues[1].textContent.trim();
            const selectedParticiple = formValues[2].textContent.trim();
            
            return selectedBase === currentVerb.base && 
                   selectedPast === currentVerb.past && 
                   selectedParticiple === currentVerb.participle;
        }

        // Eredmények megjelenítése
        function showResults() {
            document.getElementById('quizContainer').style.display = 'none';
            document.getElementById('results').classList.add('show');
            
            const percentage = Math.round((score / shuffledVerbs.length) * 100);
            document.getElementById('scoreCircle').textContent = `${score}/${shuffledVerbs.length}`;
            
            let message = '';
            if (percentage === 100) {
                message = 'Tökéletes eredmény! 🌟';
            } else if (percentage >= 80) {
                message = 'Kiváló! Szinte hibátlan! 🎉';
            } else if (percentage >= 60) {
                message = 'Jó! Még van hova fejlődnöd! 💪';
            } else if (percentage >= 40) {
                message = 'Kezd jól alakulni! Gyakorlás a siker titka! 📚';
            } else {
                message = 'Ne add fel! Próbálj meg többet gyakorolni! 🚀';
            }
            
            document.getElementById('scoreText').textContent = `${percentage}% - ${message}`;
        }

        // Event listenerek
        document.getElementById('submitBtn').addEventListener('click', checkAnswer);
        document.getElementById('nextBtn').addEventListener('click', () => {
            currentQuestionIndex++;
            loadQuestion();
        });
        document.getElementById('restartBtn').addEventListener('click', init);

        // Indítás
        init();
    </script>
</body>
</html>
